<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pendler Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
      background: #f0f0f0;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 24px;
    }

    .dashboard {
      background: white;
      width: 100%;
      max-width: 1100px;
      padding: 36px 40px 28px;
      border-radius: 6px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.08);
    }

    /* ---- Header ---- */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 36px;
      padding-bottom: 16px;
      border-bottom: 1px solid #ebebeb;
    }
    .header-clock {
      font-size: 26px;
      font-weight: 300;
      color: #777;
      letter-spacing: 0.5px;
    }
    .header-meta {
      font-size: 13px;
      color: #bbb;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* ---- Section label – same style on both columns ---- */
    .section-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1.8px;
      color: #bbb;
      margin-bottom: 12px;
    }

    /* ---- Top grid ---- */
    .top-grid {
      display: grid;
      grid-template-columns: 55% 45%;
      gap: 0;
      margin-bottom: 40px;
    }

    /* Fixed-height area above the big time – keeps both columns vertically aligned */
    .badge-area {
      min-height: 30px;
      display: flex;
      align-items: center;
      margin-bottom: 6px;
    }

    /* Both departure times: identical size + weight */
    .big-time {
      font-size: 52px;
      font-weight: 300;
      color: #222;
      line-height: 1;
      margin-bottom: 10px;
    }
    .big-time.dim {
      opacity: 0.32;
      text-decoration: line-through;
    }
    .delay-badge {
      font-size: 20px;
      color: #e07800;
      margin-left: 10px;
      font-weight: 400;
    }

    /* ---- Left column ---- */
    .next-line-name {
      font-size: 22px;
      color: #333;
      margin-bottom: 5px;
    }
    .next-route {
      font-size: 15px;
      color: #999;
      margin-bottom: 12px;
    }
    .next-platform {
      font-size: 14px;
      color: #bbb;
    }
    .info-hint {
      margin-top: 12px;
      font-size: 14px;
      color: #e07800;
    }
    .cancelled-badge {
      display: inline-flex;
      align-items: center;
      background: #cc0000;
      color: white;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.6px;
      padding: 3px 8px;
      border-radius: 3px;
      text-transform: uppercase;
    }

    /* ---- Right column ---- */
    .top-right {
      padding-left: 40px;
      border-left: 1px solid #f0f0f0;
    }

    /* ---- Rain banner (right column, prominent) ---- */
    .rain-banner {
      border-radius: 6px;
      padding: 13px 16px;
      margin-top: 4px;
      font-size: 15px;
      font-weight: 600;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .rain-banner .rain-detail {
      font-size: 12px;
      font-weight: 400;
      opacity: 0.85;
    }
    /* Rain during bike window → red */
    .rain-banner.rain-yes {
      background: #c23b00;
      color: white;
    }
    /* Currently raining but not during window → blue-ish info */
    .rain-banner.rain-now {
      background: #e8f4fd;
      color: #1a5c96;
      border: 1px solid #b8d8f0;
      font-weight: 500;
    }
    /* Rain in < 30 min → orange warning */
    .rain-banner.rain-soon {
      background: #fff3e0;
      color: #b86000;
      border: 1px solid #ffd080;
    }
    /* Rain in 30–120 min → light yellow info */
    .rain-banner.rain-later {
      background: #fffde7;
      color: #888;
      border: 1px solid #f5e8a0;
      font-weight: 400;
      font-size: 14px;
    }
    /* No rain → subtle green */
    .rain-banner.rain-no {
      background: #f0f9f4;
      color: #4a8a5a;
      border: 1px solid #c8ecd8;
      font-weight: 500;
    }
    /* Missed window */
    .rain-banner.rain-missed {
      background: none;
      color: #e07800;
      font-size: 13px;
      font-weight: 400;
      padding: 0;
      margin-top: 10px;
    }

    /* ---- More connections ---- */
    .more-connections {
      border-top: 1px solid #ebebeb;
      padding-top: 28px;
    }
    .conn-item {
      padding: 14px 0;
      border-bottom: 1px solid #f5f5f5;
    }
    .conn-item:last-child { border-bottom: none; }

    .conn-top-row {
      display: flex;
      align-items: baseline;
      gap: 20px;
      margin-bottom: 4px;
      flex-wrap: wrap;
    }
    .conn-leg-time {
      font-size: 14px;
      color: #aaa;
    }
    .conn-rain-label { font-size: 14px; color: #aaa; }
    .conn-rain-label.wet  { color: #e07800; font-weight: 600; }
    .conn-rain-label.ok   { color: #4a8a5a; }

    .conn-train-row {
      font-size: 17px;
      color: #333;
      margin-bottom: 2px;
    }
    .conn-train-row.cancelled-text {
      text-decoration: line-through;
      opacity: 0.45;
    }
    .conn-delay { font-size: 14px; color: #e07800; margin-left: 6px; }
    .conn-route { font-size: 13px; color: #bbb; }

    /* ---- States ---- */
    .state-box {
      padding: 60px 0;
      text-align: center;
      color: #bbb;
      font-size: 18px;
    }
    .state-box.error { color: #cc4444; }

    .footer {
      font-size: 11px;
      color: #d0d0d0;
      text-align: right;
      margin-top: 24px;
    }

    /* ============================================================
       RESPONSIVE
       ============================================================ */

    /* iPad portrait / large phones in landscape */
    @media (max-width: 768px) {
      body { padding: 10px; }
      .dashboard { padding: 24px 20px 18px; }
      .top-grid {
        grid-template-columns: 1fr;
        gap: 0;
      }
      .top-right {
        border-left: none;
        padding-left: 0;
        border-top: 1px solid #f0f0f0;
        padding-top: 24px;
        margin-top: 24px;
      }
      .big-time { font-size: 46px; }
    }

    /* iPhone portrait (up to 430 px) */
    @media (max-width: 430px) {
      body { padding: 6px; }
      .dashboard { padding: 16px 14px 14px; border-radius: 4px; }
      .header { margin-bottom: 24px; }
      .header-clock { font-size: 20px; }
      .header-meta { font-size: 11px; }
      .section-label { font-size: 11px; letter-spacing: 1.2px; }
      .big-time { font-size: 38px; }
      .next-line-name { font-size: 18px; }
      .next-route { font-size: 14px; }
      .rain-banner { font-size: 14px; padding: 11px 13px; }
      .top-grid { margin-bottom: 28px; }
      .more-connections { padding-top: 20px; }
      .conn-train-row { font-size: 15px; }
    }

    /* Very small (iPhone SE, 375 px) */
    @media (max-width: 390px) {
      .big-time { font-size: 34px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
  // =========================================================
  //  CONFIGURATION
  // =========================================================
  const CFG = {
    giessen:   { eva: '8000124', lat: 50.5753, lon: 8.6774 },
    frankfurt: { eva: '8000105', lat: 50.1069, lon: 8.6633 },
    bikeMin:   20,   // bike ride to Gießen HBF (including locking bike etc.)
    walkMin:   10,   // walk from Frankfurt HBF to office (or reverse)
    morningStart: 4,
    morningEnd:  13,
    dataRefreshMs:  5 * 60 * 1000,
    clockRefreshMs: 20 * 1000,
    maxTrains: 5,
  };

  // =========================================================
  //  UTILITIES
  // =========================================================
  const p2 = n => String(n).padStart(2, '0');

  function fmtTime(d) {
    if (!d) return '--:--';
    return p2(d.getHours()) + ':' + p2(d.getMinutes());
  }

  function addMin(d, m) {
    return new Date(d.getTime() + m * 60_000);
  }

  function parseIrisTs(ts) {
    if (!ts || ts.length < 10) return null;
    return new Date(
      2000 + +ts.slice(0, 2),
      +ts.slice(2, 4) - 1,
      +ts.slice(4, 6),
      +ts.slice(6, 8),
      +ts.slice(8, 10),
    );
  }

  function isMorning() {
    const h = new Date().getHours();
    return h >= CFG.morningStart && h < CFG.morningEnd;
  }

  function irisDateHour(hourOffset) {
    const t = new Date(Date.now() + hourOffset * 3_600_000);
    return {
      date: String(t.getFullYear()).slice(2) + p2(t.getMonth() + 1) + p2(t.getDate()),
      hour: p2(t.getHours()),
    };
  }

  // =========================================================
  //  IRIS API
  // =========================================================
  const IRIS_BASE = 'https://iris.noncd.db.de/iris-tts/timetable';

  async function irisPlan(eva, hourOffset) {
    const { date, hour } = irisDateHour(hourOffset);
    try {
      const r = await fetch(`${IRIS_BASE}/plan/${eva}/${date}/${hour}`, { cache: 'no-cache' });
      return r.ok ? r.text() : '<timetable/>';
    } catch { return '<timetable/>'; }
  }

  async function irisFchg(eva) {
    try {
      const r = await fetch(`${IRIS_BASE}/fchg/${eva}`, { cache: 'no-cache' });
      return r.ok ? r.text() : '<timetable/>';
    } catch { return '<timetable/>'; }
  }

  function parseFchg(xml) {
    const doc = new DOMParser().parseFromString(xml, 'text/xml');
    const map = {};
    for (const s of doc.querySelectorAll('s')) map[s.getAttribute('id')] = s;
    return map;
  }

  function parsePlan(xml, fchgMap, dirKeyword, cutoffTime) {
    const doc = new DOMParser().parseFromString(xml, 'text/xml');
    const trains = [];

    for (const s of doc.querySelectorAll('s')) {
      const dp = s.querySelector('dp');
      if (!dp) continue;

      const ppth = dp.getAttribute('ppth') || '';
      if (!ppth.includes(dirKeyword)) continue;

      const id  = s.getAttribute('id');
      const tl  = s.querySelector('tl');

      const plannedTime = parseIrisTs(dp.getAttribute('pt'));
      if (!plannedTime || plannedTime < cutoffTime) continue;

      let line = dp.getAttribute('l') || dp.getAttribute('fb') || '';
      if (!line && tl) {
        const c = tl.getAttribute('c') || '';
        const n = tl.getAttribute('n') || '';
        line = (c + (n ? ' ' + n : '')).trim();
      }

      let currentTime = plannedTime;
      let cancelled   = false;
      let hasHint     = false;
      let platform    = dp.getAttribute('pp') || '';

      const chg = fchgMap[id];
      if (chg) {
        const cdp = chg.querySelector('dp');
        if (cdp) {
          const ct = cdp.getAttribute('ct');
          if (ct) currentTime = parseIrisTs(ct) || plannedTime;
          if (cdp.getAttribute('cs') === 'c') cancelled = true;
          const cp = cdp.getAttribute('cp');
          if (cp) platform = cp;
        }
        const hintMsg = chg.querySelector('m[t="h"]');
        if (hintMsg) hasHint = hintMsg.getAttribute('cat') || 'Information';
      }

      const stops     = ppth.split('|');
      const targetIdx = stops.findIndex(s => s.includes(dirKeyword));
      const before    = targetIdx > 0 ? stops.slice(0, targetIdx) : [];
      const viaStops  = before.slice(-2).join(', ');

      trains.push({
        id, line, plannedTime, currentTime, cancelled, hasHint, platform, viaStops,
        delay: Math.max(0, Math.round((currentTime - plannedTime) / 60_000)),
      });
    }
    return trains;
  }

  // =========================================================
  //  OPEN-METEO RAIN API
  // =========================================================
  async function fetchRain(lat, lon) {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&minutely_15=precipitation&timezone=Europe%2FBerlin&forecast_days=1`;
    try {
      const r = await fetch(url);
      return r.ok ? r.json() : null;
    } catch { return null; }
  }

  function rainInWindow(rain, windowStart, windowEnd) {
    if (!rain?.minutely_15) return { wet: false, startsInMin: null };
    const { time, precipitation } = rain.minutely_15;
    for (let i = 0; i < time.length; i++) {
      const slotStart = new Date(time[i]);
      const slotEnd   = new Date(+slotStart + 15 * 60_000);
      if (precipitation[i] > 0.1 && slotEnd > windowStart && slotStart < windowEnd) {
        const startsInMin = Math.max(0, Math.round((slotStart - windowStart) / 60_000));
        return { wet: true, startsInMin };
      }
    }
    return { wet: false, startsInMin: null };
  }

  function nextRainFromNow(rain) {
    if (!rain?.minutely_15) return null;
    const { time, precipitation } = rain.minutely_15;
    const now     = new Date();
    const horizon = addMin(now, 120);
    for (let i = 0; i < time.length; i++) {
      const slotStart = new Date(time[i]);
      if (slotStart < now || slotStart > horizon) continue;
      if (precipitation[i] > 0.1) return Math.round((slotStart - now) / 60_000);
    }
    return null;
  }

  function isCurrentlyRaining(rain) {
    if (!rain?.minutely_15) return false;
    const { time, precipitation } = rain.minutely_15;
    const now = new Date();
    for (let i = 0; i < time.length; i++) {
      const slotStart = new Date(time[i]);
      const slotEnd   = new Date(+slotStart + 15 * 60_000);
      if (slotStart <= now && now < slotEnd) return precipitation[i] > 0.1;
    }
    return false;
  }

  // =========================================================
  //  LOAD ALL DATA
  // =========================================================
  async function loadAll() {
    const morning   = isMorning();
    const from      = morning ? CFG.giessen   : CFG.frankfurt;
    const dirFilter = morning ? 'Frankfurt(Main)Hbf' : 'Gießen';
    const travelMin = morning ? CFG.bikeMin   : CFG.walkMin;

    const [p0, p1, p2xml, fchgXml, rain] = await Promise.all([
      irisPlan(from.eva, 0),
      irisPlan(from.eva, 1),
      irisPlan(from.eva, 2),
      irisFchg(from.eva),
      fetchRain(from.lat, from.lon),
    ]);

    const fchgMap = parseFchg(fchgXml);
    const cutoff  = addMin(new Date(), -3);

    const seen = new Set();
    const trains = [
      ...parsePlan(p0,    fchgMap, dirFilter, cutoff),
      ...parsePlan(p1,    fchgMap, dirFilter, cutoff),
      ...parsePlan(p2xml, fchgMap, dirFilter, cutoff),
    ]
    .filter(t => { if (seen.has(t.id)) return false; seen.add(t.id); return true; })
    .sort((a, b) => a.currentTime - b.currentTime)
    .slice(0, CFG.maxTrains);

    for (const t of trains) {
      t.legStart = addMin(t.currentTime, -travelMin);
      t.rain     = rainInWindow(rain, t.legStart, t.currentTime);
    }

    return { morning, trains, rain, travelMin, loadedAt: new Date() };
  }

  // =========================================================
  //  RENDER HELPERS
  // =========================================================
  function hintLabel(cat) {
    if (cat === 'Störung')     return 'Störung gemeldet';
    if (cat === 'Bauarbeiten') return 'Bauarbeiten';
    return 'aktuelle Hinweise';
  }

  // Compact rain label for the "Weitere Verbindungen" list
  function connRainLabel(train, generalNextRain, currentlyRaining) {
    if (train.rain.wet) {
      return {
        cls: 'wet',
        text: train.rain.startsInMin === 0 ? 'Regen ab Abfahrt' : `Regen in ${train.rain.startsInMin} min`,
      };
    }
    if (currentlyRaining)                         return { cls: '',   text: 'Aktuell Regen' };
    if (generalNextRain !== null && generalNextRain <= 60)
                                                  return { cls: '',   text: `Regen in ca. ${generalNextRain} min` };
    return { cls: 'ok', text: 'Kein Regen' };
  }

  // Prominent rain banner for the top-right column
  function rainBannerHTML(train, generalNextRain, currentlyRaining, missed) {
    if (missed) {
      return '<div class="rain-banner rain-missed">Abfahrtszeit bereits verpasst</div>';
    }
    if (train.rain.wet) {
      const detail = train.rain.startsInMin === 0
        ? 'Regen ab Fahrtbeginn'
        : `Regen startet nach ${train.rain.startsInMin} min`;
      return `<div class="rain-banner rain-yes">Regenkleidung benötigt<span class="rain-detail">${detail}</span></div>`;
    }
    if (currentlyRaining) {
      return '<div class="rain-banner rain-now">Aktuell Regen · Fahrt voraussichtlich trocken</div>';
    }
    if (generalNextRain !== null && generalNextRain <= 30) {
      return `<div class="rain-banner rain-soon">Regen in ca. ${generalNextRain} min</div>`;
    }
    if (generalNextRain !== null) {
      return `<div class="rain-banner rain-later">Regen in ca. ${generalNextRain} min</div>`;
    }
    return '<div class="rain-banner rain-no">Kein Regen erwartet</div>';
  }

  // =========================================================
  //  RENDER
  // =========================================================
  function render(data) {
    const { morning, trains, rain, loadedAt } = data;
    const currentlyRaining = isCurrentlyRaining(rain);
    const generalNextRain  = nextRainFromNow(rain);
    const legLabel  = morning ? 'Mit dem Fahrrad losfahren um' : 'Zu Fuß zum Bahnhof um';
    const destLabel = morning ? 'Frankfurt (Main) Hbf' : 'Gießen Hbf';
    const modeText  = morning
      ? 'Gießen → Frankfurt · Hinweg'
      : 'Frankfurt → Gießen · Rückweg';

    let html = `
<div class="dashboard">
  <div class="header">
    <div class="header-clock" id="js-clock">${fmtTime(new Date())} Uhr</div>
    <div class="header-meta">${modeText}</div>
  </div>`;

    const now = new Date();

    if (trains.length === 0) {
      html += `<div class="state-box">Keine Verbindungen in den nächsten 3 Stunden gefunden.</div>`;
    } else {
      const next       = trains[0];
      const missed     = next.legStart < addMin(now, -2); // 2-min grace period
      const delayBadge = next.delay > 0
        ? `<span class="delay-badge">+${next.delay} min</span>` : '';
      const routeStr   = next.viaStops ? `über ${next.viaStops}` : '';

      html += `
  <div class="top-grid">

    <!-- ---- LEFT: train info ---- -->
    <div>
      <div class="section-label">Nächste ${missed ? 'angezeigte' : 'mögliche'} Verbindung</div>

      <!-- fixed-height badge area keeps time vertically aligned with right column -->
      <div class="badge-area">
        ${next.cancelled ? '<span class="cancelled-badge">Zug fällt aus</span>' : ''}
      </div>

      <div class="big-time${next.cancelled ? ' dim' : ''}">
        ${fmtTime(next.currentTime)}${delayBadge}
      </div>
      <div class="next-line-name">${next.line}</div>
      <div class="next-route">${destLabel}${routeStr ? ' ' + routeStr : ''}</div>
      ${next.platform ? `<div class="next-platform">Gleis ${next.platform}</div>` : ''}
      ${next.hasHint && !next.cancelled ? `<div class="info-hint">Achtung: ${hintLabel(next.hasHint)}</div>` : ''}
    </div>

    <!-- ---- RIGHT: bike departure + rain ---- -->
    <div class="top-right">
      <div class="section-label">${legLabel}</div>

      <!-- spacer to match badge-area height on left -->
      <div class="badge-area"></div>

      <div class="big-time${missed ? ' dim' : ''}">
        ${fmtTime(next.legStart)}
      </div>

      ${rainBannerHTML(next, generalNextRain, currentlyRaining, missed)}
    </div>

  </div>`;

      // ---- more connections ----
      const more = trains.slice(1);
      if (more.length > 0) {
        html += `<div class="more-connections"><div class="section-label">Weitere Verbindungen</div>`;
        for (const t of more) {
          const tMissed = t.legStart < addMin(now, -2);
          const dBadge  = t.delay > 0 ? `<span class="conn-delay">+${t.delay} min</span>` : '';
          const rl      = connRainLabel(t, generalNextRain, currentlyRaining);

          html += `
<div class="conn-item" style="${tMissed ? 'opacity:0.42' : ''}">
  <div class="conn-top-row">
    <span class="conn-leg-time">Losfahren um ${fmtTime(t.legStart)}${tMissed ? ' <small>(verpasst)</small>' : ''}</span>
    ${!tMissed ? `<span class="conn-rain-label ${rl.cls}">${rl.text}</span>` : ''}
  </div>
  <div class="conn-train-row${t.cancelled ? ' cancelled-text' : ''}">
    ${fmtTime(t.currentTime)}${dBadge}&ensp;&middot;&ensp;${t.line}
  </div>
  <div class="conn-route">${destLabel}${t.viaStops ? ' · ' + t.viaStops : ''}</div>
</div>`;
        }
        html += `</div>`;
      }
    }

    html += `
  <div class="footer">Aktualisiert: ${fmtTime(loadedAt)} Uhr · Zugdaten: DB IRIS · Wetter: Open-Meteo</div>
</div>`;

    document.getElementById('root').innerHTML = html;
  }

  function renderError(msg) {
    document.getElementById('root').innerHTML = `
<div class="dashboard">
  <div class="state-box error">
    Fehler beim Laden der Daten.<br>
    <small style="font-size:14px;opacity:0.7">${msg}</small>
  </div>
</div>`;
  }

  function updateClock() {
    const el = document.getElementById('js-clock');
    if (el) el.innerHTML = fmtTime(new Date()) + ' Uhr';
  }

  // =========================================================
  //  MAIN LOOP
  // =========================================================
  let state = null;

  async function refresh() {
    try {
      state = await loadAll();
      render(state);
    } catch (e) {
      renderError(e.message || String(e));
    }
  }

  document.getElementById('root').innerHTML = `
<div class="dashboard">
  <div class="state-box">Verbindungen werden geladen …</div>
</div>`;

  refresh();
  setInterval(refresh, CFG.dataRefreshMs);
  setInterval(updateClock, CFG.clockRefreshMs);
  </script>
</body>
</html>
