<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pendler Dashboard</title>
  <style>
    /* ============================================================
       CSS CUSTOM PROPERTIES (Light / Dark)
       ============================================================ */
    :root {
      --bg:        #f0f0f0;
      --card:      #ffffff;
      --c1:        #1c1c1e;   /* big times, strong headings */
      --c2:        #333333;   /* line names */
      --c3:        #888888;   /* routes, secondary */
      --c4:        #bbbbbb;   /* platform, faint labels */
      --border:    #e8e8e8;
      --border-s:  #f2f2f2;
      --accent:    #e07800;   /* delays, orange warnings */
      --err:       #cc0000;
      --ok:        #4a8a5a;
      --btn-bg:    #f0f0f0;
      --btn-fg:    #666666;
      --btn-act:   #1c1c1e;
      --lbl:       #aaaaaa;   /* section-label */
    }
    body.dark {
      --bg:        #000000;
      --card:      #1c1c1e;
      --c1:        #f5f5f5;
      --c2:        #cccccc;
      --c3:        #888888;
      --c4:        #555555;
      --border:    #2c2c2e;
      --border-s:  #242424;
      --accent:    #f09030;
      --err:       #ff5555;
      --ok:        #60b870;
      --btn-bg:    #2c2c2e;
      --btn-fg:    #999999;
      --btn-act:   #f5f5f5;
      --lbl:       #666666;
    }

    /* ============================================================
       BASE
       ============================================================ */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 24px;
      transition: background 0.3s;
    }

    .dashboard {
      background: var(--card);
      width: 100%;
      max-width: 1100px;
      padding: 36px 40px 28px;
      border-radius: 8px;
      box-shadow: 0 1px 8px rgba(0,0,0,0.1);
      transition: background 0.3s;
    }

    /* ============================================================
       HEADER
       ============================================================ */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 36px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    .header-clock {
      font-size: 26px;
      font-weight: 300;
      color: var(--c3);
      letter-spacing: 0.5px;
      flex-shrink: 0;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header-meta {
      font-size: 12px;
      color: var(--lbl);
      text-transform: uppercase;
      letter-spacing: 1.2px;
    }
    /* Manual override indicator on mode text */
    .header-meta.manual {
      color: var(--accent);
    }

    /* Small icon toggle buttons */
    .ctrl-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 30px;
      height: 30px;
      border-radius: 6px;
      border: none;
      background: var(--btn-bg);
      color: var(--btn-fg);
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      flex-shrink: 0;
    }
    .ctrl-btn:hover   { background: var(--border); color: var(--btn-act); }
    .ctrl-btn.active  { background: var(--accent);  color: white; }

    /* ============================================================
       SECTION LABEL – same style both columns
       ============================================================ */
    .section-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.8px;
      color: var(--lbl);
      margin-bottom: 12px;
    }

    /* ============================================================
       TOP GRID
       ============================================================ */
    .top-grid {
      display: grid;
      grid-template-columns: 55% 45%;
      margin-bottom: 36px;
    }

    /* Fixed-height badge zone – keeps both big-times vertically aligned */
    .badge-zone {
      min-height: 28px;
      display: flex;
      align-items: center;
      margin-bottom: 8px;
    }

    /* The two big departure times – identical size */
    .big-time {
      font-size: 52px;
      font-weight: 300;
      color: var(--c1);
      line-height: 1;
      margin-bottom: 10px;
    }
    .big-time.dim {
      opacity: 0.30;
      text-decoration: line-through;
    }
    .delay-badge {
      font-size: 20px;
      color: var(--accent);
      margin-left: 10px;
      font-weight: 400;
    }

    /* ---- Left column ---- */
    .next-line-name {
      font-size: 22px;
      color: var(--c2);
      margin-bottom: 4px;
    }
    .next-route {
      font-size: 15px;
      color: var(--c3);
      margin-bottom: 10px;
    }
    .next-platform {
      font-size: 13px;
      color: var(--c4);
      margin-bottom: 4px;
    }
    .info-hint {
      margin-top: 10px;
      font-size: 14px;
      color: var(--accent);
    }
    .cancelled-badge {
      display: inline-flex;
      align-items: center;
      background: var(--err);
      color: white;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.6px;
      padding: 3px 8px;
      border-radius: 3px;
      text-transform: uppercase;
    }

    /* ---- Right column ---- */
    .top-right {
      padding-left: 40px;
      border-left: 1px solid var(--border-s);
    }

    /* Arrival block under rain banner */
    .arrival-block {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid var(--border-s);
    }
    .arrival-lbl {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--lbl);
      margin-bottom: 4px;
    }
    .arrival-time-big {
      font-size: 22px;
      font-weight: 300;
      color: var(--c2);
      margin-bottom: 2px;
    }
    .arrival-detail {
      font-size: 12px;
      color: var(--c4);
    }

    /* ============================================================
       RAIN BANNERS (prominent, top-right column)
       ============================================================ */
    .rain-banner {
      border-radius: 6px;
      padding: 12px 15px;
      margin-top: 4px;
      font-size: 15px;
      font-weight: 600;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .rain-banner .rb-detail {
      font-size: 12px;
      font-weight: 400;
      opacity: 0.80;
    }
    /* Rain during window → RED */
    .rain-banner.rb-yes   { background: #c23b00; color: white; }
    .rain-banner.rb-now   { background: #ddeef8; color: #1a5c96; border: 1px solid #b0d0ec; }
    .rain-banner.rb-soon  { background: #fff3e0; color: #b86000; border: 1px solid #ffd080; }
    .rain-banner.rb-later { background: var(--border-s); color: var(--c3); border: 1px solid var(--border); font-weight: 400; font-size: 14px; }
    .rain-banner.rb-no    { background: #edf7f0; color: #3a7a4a; border: 1px solid #bce0cb; font-weight: 500; }
    .rain-banner.rb-missed{ background: none; color: var(--accent); font-size: 13px; font-weight: 400; padding: 0; margin-top: 8px; border: none; }

    /* Dark-mode adjustments for rain banners */
    body.dark .rain-banner.rb-yes   { background: #7a2000; }
    body.dark .rain-banner.rb-now   { background: #0a2040; color: #80c0f0; border-color: #1a4060; }
    body.dark .rain-banner.rb-soon  { background: #3a2000; color: #d4a040; border-color: #604000; }
    body.dark .rain-banner.rb-later { background: var(--border-s); }
    body.dark .rain-banner.rb-no    { background: #0a2018; color: #60b070; border-color: #1a4030; }

    /* ============================================================
       MORE CONNECTIONS
       ============================================================ */
    .more-connections {
      border-top: 1px solid var(--border);
      padding-top: 26px;
    }
    .conn-item {
      padding: 13px 0;
      border-bottom: 1px solid var(--border-s);
    }
    .conn-item:last-child { border-bottom: none; }

    .conn-top-row {
      display: flex;
      align-items: baseline;
      gap: 16px;
      margin-bottom: 3px;
      flex-wrap: wrap;
    }
    .conn-leg-time  { font-size: 13px; color: var(--c4); }
    .conn-arrival   { font-size: 13px; color: var(--c3); margin-left: auto; }
    .conn-rain-lbl  { font-size: 13px; color: var(--c4); }
    .conn-rain-lbl.wet  { color: var(--accent); font-weight: 600; }
    .conn-rain-lbl.ok   { color: var(--ok); }

    .conn-train-row {
      font-size: 17px;
      color: var(--c2);
      margin-bottom: 2px;
    }
    .conn-train-row.cancelled { text-decoration: line-through; opacity: 0.40; }
    .conn-delay { font-size: 13px; color: var(--accent); margin-left: 6px; }
    .conn-route { font-size: 13px; color: var(--c4); }

    /* ============================================================
       STATES / FOOTER
       ============================================================ */
    .state-box {
      padding: 60px 0;
      text-align: center;
      color: var(--c4);
      font-size: 18px;
    }
    .state-box.error { color: var(--err); }

    .footer {
      font-size: 11px;
      color: var(--c4);
      text-align: right;
      margin-top: 24px;
      opacity: 0.7;
    }

    /* ============================================================
       RESPONSIVE
       ============================================================ */
    @media (max-width: 768px) {
      body { padding: 10px; }
      .dashboard { padding: 24px 20px 18px; }
      .top-grid { grid-template-columns: 1fr; }
      .top-right {
        border-left: none;
        padding-left: 0;
        border-top: 1px solid var(--border-s);
        padding-top: 24px;
        margin-top: 24px;
      }
      .big-time { font-size: 46px; }
      .conn-arrival { margin-left: 0; }
    }

    @media (max-width: 430px) {
      body { padding: 6px; }
      .dashboard { padding: 16px 14px 14px; border-radius: 4px; }
      .header { margin-bottom: 22px; }
      .header-clock { font-size: 19px; }
      .header-meta  { font-size: 10px; }
      .section-label { font-size: 10px; letter-spacing: 1.2px; }
      .big-time { font-size: 38px; }
      .next-line-name { font-size: 18px; }
      .next-route { font-size: 13px; }
      .rain-banner { font-size: 13px; padding: 10px 13px; }
      .arrival-time-big { font-size: 18px; }
      .top-grid { margin-bottom: 24px; }
    }

    @media (max-width: 390px) {
      .big-time { font-size: 34px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
  // ============================================================
  //  CONFIG
  // ============================================================
  const CFG = {
    giessen:      { eva: '8000124', lat: 50.5753, lon: 8.6774, name: 'Gießen Hbf' },
    frankfurt:    { eva: '8000105', lat: 50.1069, lon: 8.6633, name: 'Frankfurt (Main) Hbf' },
    bikeMin:  20,   // cycling to/from Gießen HBF
    walkMin:  10,   // walking to/from Frankfurt HBF
    darkStart: 21,  // auto dark mode from 21:00
    darkEnd:    7,  // auto dark mode until 07:00
    dataRefreshMs:  5 * 60 * 1000,
    clockRefreshMs: 20 * 1000,
    maxFetch:   7,  // fetch extra trains so we always have 4-5 visible ones
  };

  // Journey-time fallback (minutes) when IRIS matching fails
  const JOURNEY_FALLBACK = { ICE:45, IC:50, EC:50, RE:55, RB:65, S:60 };

  // ============================================================
  //  APP STATE
  // ============================================================
  let manualDirection = null;  // null = auto | 'morning' | 'evening'
  let manualDark      = null;  // null = auto | true | false
  let appState        = null;

  // ============================================================
  //  UTILITIES
  // ============================================================
  const p2 = n => String(n).padStart(2, '0');

  function fmtTime(d) {
    if (!d) return '--:--';
    return p2(d.getHours()) + ':' + p2(d.getMinutes());
  }

  function addMin(d, m) { return new Date(d.getTime() + m * 60_000); }

  function parseIrisTs(ts) {
    if (!ts || ts.length < 10) return null;
    return new Date(2000 + +ts.slice(0,2), +ts.slice(2,4)-1,
                    +ts.slice(4,6), +ts.slice(6,8), +ts.slice(8,10));
  }

  // IRIS trip key: everything except the trailing stop-index
  function tripKey(id) {
    const parts = id.split('-');
    return parts.slice(0, -1).join('-');
  }

  // Estimated journey time based on line prefix
  function estJourney(line) {
    const pfx = line.replace(/[^A-Z]/g, '').substring(0, 3);
    return JOURNEY_FALLBACK[pfx] || 55;
  }

  // ============================================================
  //  DIRECTION + THEME
  // ============================================================
  function autoIsMorning() {
    const h = new Date().getHours();
    return h >= 4 && h < 13;
  }

  function isMorning() {
    return manualDirection !== null ? manualDirection === 'morning' : autoIsMorning();
  }

  function isManualDir() { return manualDirection !== null; }

  function isDark() {
    if (manualDark !== null) return manualDark;
    const h = new Date().getHours();
    return h >= CFG.darkStart || h < CFG.darkEnd;
  }

  function applyTheme() {
    document.body.classList.toggle('dark', isDark());
  }

  function toggleDirection() {
    const auto = autoIsMorning() ? 'morning' : 'evening';
    if (manualDirection === null) {
      // First press: switch to opposite of auto
      manualDirection = auto === 'morning' ? 'evening' : 'morning';
    } else {
      // Second press: reset to auto
      manualDirection = null;
    }
    refresh();
  }

  function toggleDark() {
    manualDark = !isDark();
    applyTheme();
    // Re-render header buttons
    updateHeaderButtons();
  }

  function updateHeaderButtons() {
    const dirBtn  = document.getElementById('btn-dir');
    const darkBtn = document.getElementById('btn-dark');
    if (dirBtn)  dirBtn.classList.toggle('active', isManualDir());
    if (darkBtn) darkBtn.classList.toggle('active', manualDark !== null);
    // update dark icon
    if (darkBtn) darkBtn.innerHTML = isDark() ? iconSun() : iconMoon();
  }

  // ============================================================
  //  SVG ICONS
  // ============================================================
  function iconSwap() {
    return `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 4l4 4-4 4"/><line x1="3" y1="8" x2="21" y2="8"/><path d="M7 20l-4-4 4-4"/><line x1="21" y1="16" x2="3" y2="16"/></svg>`;
  }
  function iconMoon() {
    return `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;
  }
  function iconSun() {
    return `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>`;
  }

  // ============================================================
  //  IRIS API
  // ============================================================
  const IRIS = 'https://iris.noncd.db.de/iris-tts/timetable';

  function irisDateStr(d) {
    return String(d.getFullYear()).slice(2) + p2(d.getMonth()+1) + p2(d.getDate());
  }

  async function irisPlanAt(eva, date) {
    const url = `${IRIS}/plan/${eva}/${irisDateStr(date)}/${p2(date.getHours())}`;
    try { const r = await fetch(url, {cache:'no-cache'}); return r.ok ? r.text() : '<timetable/>'; }
    catch { return '<timetable/>'; }
  }

  async function irisFchg(eva) {
    try { const r = await fetch(`${IRIS}/fchg/${eva}`, {cache:'no-cache'}); return r.ok ? r.text() : '<timetable/>'; }
    catch { return '<timetable/>'; }
  }

  function parseFchg(xml) {
    const doc = new DOMParser().parseFromString(xml, 'text/xml');
    const m = {};
    for (const s of doc.querySelectorAll('s')) m[s.getAttribute('id')] = s;
    return m;
  }

  // Parse departures from a single plan hour
  function parseDepartures(xml, fchgMap, dirKeyword, cutoff) {
    const doc = new DOMParser().parseFromString(xml, 'text/xml');
    const out = [];
    for (const s of doc.querySelectorAll('s')) {
      const dp = s.querySelector('dp');
      if (!dp) continue;
      const ppth = dp.getAttribute('ppth') || '';
      if (!ppth.includes(dirKeyword)) continue;

      const id = s.getAttribute('id');
      const tl = s.querySelector('tl');
      const plannedTime = parseIrisTs(dp.getAttribute('pt'));
      if (!plannedTime || plannedTime < cutoff) continue;

      let line = dp.getAttribute('l') || dp.getAttribute('fb') || '';
      if (!line && tl) line = (tl.getAttribute('c')||'') + (tl.getAttribute('n') ? ' '+tl.getAttribute('n') : '');
      line = line.trim();

      let currentTime = plannedTime, cancelled = false, hasHint = false, platform = dp.getAttribute('pp')||'';
      const chg = fchgMap[id];
      if (chg) {
        const cdp = chg.querySelector('dp');
        if (cdp) {
          const ct = parseIrisTs(cdp.getAttribute('ct'));
          if (ct) currentTime = ct;
          if (cdp.getAttribute('cs') === 'c') cancelled = true;
          const cp = cdp.getAttribute('cp'); if (cp) platform = cp;
        }
        const hm = chg.querySelector('m[t="h"]');
        if (hm) hasHint = hm.getAttribute('cat') || 'Information';
      }

      const stops = ppth.split('|');
      const ti = stops.findIndex(s => s.includes(dirKeyword));
      const viaStops = ti > 0 ? stops.slice(0, ti).slice(-2).join(', ') : '';

      out.push({
        id, line, plannedTime, currentTime, cancelled, hasHint, platform, viaStops,
        delay: Math.max(0, Math.round((currentTime - plannedTime) / 60_000)),
        tripKey: tripKey(id),
      });
    }
    return out;
  }

  // Build tripKey → arrival-time map from destination plan + fchg
  function buildArrivalMap(planXmls, fchgMap, fromKeyword) {
    const map = {};
    for (const xml of planXmls) {
      const doc = new DOMParser().parseFromString(xml, 'text/xml');
      for (const s of doc.querySelectorAll('s')) {
        const ar = s.querySelector('ar');
        if (!ar) continue;
        // Only arrivals from our origin direction
        if (fromKeyword && !(ar.getAttribute('ppth')||'').includes(fromKeyword)) continue;

        const id = s.getAttribute('id');
        const tk = tripKey(id);
        const plannedAr = parseIrisTs(ar.getAttribute('pt'));
        if (!plannedAr) continue;

        let currentAr = plannedAr;
        const chg = fchgMap[id];
        if (chg) {
          const car = chg.querySelector('ar');
          if (car) {
            const ct = parseIrisTs(car.getAttribute('ct'));
            if (ct) currentAr = ct;
          }
        }
        map[tk] = currentAr;
      }
    }
    return map;
  }

  // ============================================================
  //  OPEN-METEO RAIN
  // ============================================================
  async function fetchRain(lat, lon) {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&minutely_15=precipitation&timezone=Europe%2FBerlin&forecast_days=1`;
    try { const r = await fetch(url); return r.ok ? r.json() : null; }
    catch { return null; }
  }

  function rainInWindow(rain, start, end) {
    if (!rain?.minutely_15) return { wet: false, startsInMin: null };
    const { time, precipitation } = rain.minutely_15;
    for (let i = 0; i < time.length; i++) {
      const s = new Date(time[i]), e = new Date(+s + 15*60_000);
      if (precipitation[i] > 0.1 && e > start && s < end) {
        return { wet: true, startsInMin: Math.max(0, Math.round((s - start) / 60_000)) };
      }
    }
    return { wet: false, startsInMin: null };
  }

  function nextRainFromNow(rain) {
    if (!rain?.minutely_15) return null;
    const { time, precipitation } = rain.minutely_15;
    const now = new Date(), horizon = addMin(now, 120);
    for (let i = 0; i < time.length; i++) {
      const s = new Date(time[i]);
      if (s < now || s > horizon) continue;
      if (precipitation[i] > 0.1) return Math.round((s - now) / 60_000);
    }
    return null;
  }

  function isCurrentlyRaining(rain) {
    if (!rain?.minutely_15) return false;
    const { time, precipitation } = rain.minutely_15;
    const now = new Date();
    for (let i = 0; i < time.length; i++) {
      const s = new Date(time[i]), e = new Date(+s + 15*60_000);
      if (s <= now && now < e) return precipitation[i] > 0.1;
    }
    return false;
  }

  // ============================================================
  //  LOAD ALL DATA
  // ============================================================
  async function loadAll() {
    const morning   = isMorning();
    const from      = morning ? CFG.giessen   : CFG.frankfurt;
    const dest      = morning ? CFG.frankfurt : CFG.giessen;
    const dirFilter = morning ? 'Frankfurt(Main)Hbf' : 'Gießen';
    const fromKey   = morning ? 'Gießen' : 'Frankfurt(Main)Hbf'; // for arrival filter
    const travelMin = morning ? CFG.bikeMin   : CFG.walkMin;
    const now       = new Date();

    // Fetch 3 h of origin plan + fchg + rain simultaneously
    const [p0, p1, p2xml, fchgXml, rain] = await Promise.all([
      irisPlanAt(from.eva, now),
      irisPlanAt(from.eva, addMin(now, 60)),
      irisPlanAt(from.eva, addMin(now, 120)),
      irisFchg(from.eva),
      fetchRain(from.lat, from.lon),
    ]);

    const fchgMap = parseFchg(fchgXml);
    const cutoff  = addMin(now, -3);

    const seen = new Set();
    const trains = [
      ...parseDepartures(p0, fchgMap, dirFilter, cutoff),
      ...parseDepartures(p1, fchgMap, dirFilter, cutoff),
      ...parseDepartures(p2xml, fchgMap, dirFilter, cutoff),
    ]
    .filter(t => { if (seen.has(t.id)) return false; seen.add(t.id); return true; })
    .sort((a, b) => a.currentTime - b.currentTime)
    .slice(0, CFG.maxFetch);

    // Annotate with bike/walk departure + rain window
    for (const t of trains) {
      t.legStart = addMin(t.currentTime, -travelMin);
      t.rain     = rainInWindow(rain, t.legStart, t.currentTime);
    }

    // Fetch destination plan for arrival times
    // Earliest arrival ≈ first train departure + 35 min
    const firstDep = trains[0]?.currentTime || now;
    const arrStart = addMin(firstDep, 35);
    const [dp0, dp1, destFchgXml] = await Promise.all([
      irisPlanAt(dest.eva, arrStart),
      irisPlanAt(dest.eva, addMin(arrStart, 60)),
      irisFchg(dest.eva),
    ]);
    const destFchgMap  = parseFchg(destFchgXml);
    const arrivalMap   = buildArrivalMap([dp0, dp1], destFchgMap, fromKey);

    // Annotate trains with arrival times
    const finalMin = morning ? CFG.walkMin : CFG.bikeMin; // last leg after train
    for (const t of trains) {
      const trainArrival = arrivalMap[t.tripKey];
      if (trainArrival) {
        t.trainArrival = trainArrival;
        t.finalArrival = addMin(trainArrival, finalMin);
        t.arrivalReal  = true;
      } else {
        // Fallback estimate
        const journey = estJourney(t.line);
        t.trainArrival = addMin(t.currentTime, journey);
        t.finalArrival = addMin(t.trainArrival, finalMin);
        t.arrivalReal  = false;
      }
    }

    return { morning, trains, rain, travelMin, finalMin, loadedAt: new Date() };
  }

  // ============================================================
  //  RENDER HELPERS
  // ============================================================
  function hintLabel(cat) {
    if (cat === 'Störung')     return 'Störung gemeldet';
    if (cat === 'Bauarbeiten') return 'Bauarbeiten';
    return 'aktuelle Hinweise';
  }

  function rainBannerHTML(train, genNextRain, curRaining, missed) {
    if (missed) return '<div class="rain-banner rb-missed">Abfahrtszeit verpasst</div>';
    if (train.rain.wet) {
      const d = train.rain.startsInMin === 0
        ? 'Regen ab Abfahrt'
        : `Regen nach ${train.rain.startsInMin} min`;
      return `<div class="rain-banner rb-yes">Regenkleidung benötigt<span class="rb-detail">${d}</span></div>`;
    }
    if (curRaining)                            return '<div class="rain-banner rb-now">Aktuell Regen · Fahrt voraussichtlich trocken</div>';
    if (genNextRain !== null && genNextRain <= 30) return `<div class="rain-banner rb-soon">Regen in ca. ${genNextRain} min</div>`;
    if (genNextRain !== null)                   return `<div class="rain-banner rb-later">Regen in ca. ${genNextRain} min</div>`;
    return '<div class="rain-banner rb-no">Kein Regen erwartet</div>';
  }

  function connRainLabel(t, genNextRain, curRaining) {
    if (t.rain.wet) return { cls:'wet', text: t.rain.startsInMin === 0 ? 'Regen' : `Regen in ${t.rain.startsInMin} min` };
    if (curRaining)  return { cls:'',   text: 'Aktuell Regen' };
    if (genNextRain !== null && genNextRain <= 60) return { cls:'', text: `Regen in ${genNextRain} min` };
    return { cls:'ok', text: 'Kein Regen' };
  }

  function arrivalBlockHTML(train, morning) {
    const dest = morning ? 'Frankfurt' : 'Zuhause';
    const approx = train.arrivalReal ? '' : 'ca. ';
    const detail = train.arrivalReal
      ? `Zug an ${fmtTime(train.trainArrival)} + ${morning ? CFG.walkMin : CFG.bikeMin} min`
      : `Schätzung (kein Echtzeitdaten)`;
    return `<div class="arrival-block">
  <div class="arrival-lbl">Ankunft ${dest}</div>
  <div class="arrival-time-big">${approx}${fmtTime(train.finalArrival)}</div>
  <div class="arrival-detail">${detail}</div>
</div>`;
  }

  // ============================================================
  //  RENDER
  // ============================================================
  function render(data) {
    if (!data) return;
    const { morning, trains, rain, loadedAt } = data;
    const curRaining  = isCurrentlyRaining(rain);
    const genNextRain = nextRainFromNow(rain);
    const now         = new Date();
    const legLabel    = morning ? 'Mit dem Fahrrad losfahren um' : 'Zu Fuß zum Bahnhof um';
    const destLabel   = morning ? 'Frankfurt (Main) Hbf' : 'Gießen Hbf';
    const modeAuto    = autoIsMorning() ? 'morning' : 'evening';
    const modeText    = morning ? 'Gießen → Frankfurt' : 'Frankfurt → Gießen';

    // Filter: remove trains missed by >2 min
    const visible = trains.filter(t => t.legStart >= addMin(now, -2));

    const next  = visible[0];
    const more  = visible.slice(1, 5); // show up to 4 more

    const dirBtnClass = isManualDir() ? 'active' : '';
    const drkBtnClass = manualDark !== null ? 'active' : '';

    let html = `
<div class="dashboard">
  <div class="header">
    <div class="header-clock" id="js-clock">${fmtTime(now)} Uhr</div>
    <div class="header-right">
      <span class="header-meta${isManualDir() ? ' manual' : ''}">${modeText}</span>
      <button id="btn-dir"  class="ctrl-btn ${dirBtnClass}" onclick="toggleDirection()" title="Richtung wechseln">${iconSwap()}</button>
      <button id="btn-dark" class="ctrl-btn ${drkBtnClass}" onclick="toggleDark()"      title="Dark Mode">${isDark() ? iconSun() : iconMoon()}</button>
    </div>
  </div>`;

    if (!next) {
      html += `<div class="state-box">Keine erreichbaren Verbindungen in den nächsten 3 Stunden.</div>`;
    } else {
      const missed     = next.legStart < now;
      const delayBadge = next.delay > 0 ? `<span class="delay-badge">+${next.delay} min</span>` : '';
      const routeStr   = next.viaStops ? `über ${next.viaStops}` : '';

      html += `
  <div class="top-grid">

    <!-- LEFT: train -->
    <div>
      <div class="section-label">Nächste ${missed ? 'angezeigte' : 'mögliche'} Verbindung</div>
      <div class="badge-zone">
        ${next.cancelled ? '<span class="cancelled-badge">Zug fällt aus</span>' : ''}
      </div>
      <div class="big-time${next.cancelled ? ' dim' : ''}">
        ${fmtTime(next.currentTime)}${delayBadge}
      </div>
      <div class="next-line-name">${next.line}</div>
      <div class="next-route">${destLabel}${routeStr ? ' ' + routeStr : ''}</div>
      ${next.platform ? `<div class="next-platform">Gleis ${next.platform}</div>` : ''}
      ${next.hasHint && !next.cancelled ? `<div class="info-hint">Achtung: ${hintLabel(next.hasHint)}</div>` : ''}
    </div>

    <!-- RIGHT: bike/walk + rain + arrival -->
    <div class="top-right">
      <div class="section-label">${legLabel}</div>
      <div class="badge-zone"></div>
      <div class="big-time${missed ? ' dim' : ''}">${fmtTime(next.legStart)}</div>
      ${rainBannerHTML(next, genNextRain, curRaining, missed)}
      ${missed ? '' : arrivalBlockHTML(next, morning)}
    </div>

  </div>`;

      if (more.length > 0) {
        html += `<div class="more-connections"><div class="section-label">Weitere Verbindungen</div>`;
        for (const t of more) {
          const tMissed = t.legStart < now;
          const dBadge  = t.delay > 0 ? `<span class="conn-delay">+${t.delay} min</span>` : '';
          const rl      = connRainLabel(t, genNextRain, curRaining);
          const arrTxt  = t.finalArrival ? `→ ${t.arrivalReal ? '' : '~'}${fmtTime(t.finalArrival)}` : '';

          html += `
<div class="conn-item"${tMissed ? ' style="opacity:0.40"' : ''}>
  <div class="conn-top-row">
    <span class="conn-leg-time">ab ${fmtTime(t.legStart)}${tMissed ? ' <small>(verpasst)</small>' : ''}</span>
    ${arrTxt ? `<span class="conn-arrival">${arrTxt}</span>` : ''}
    ${!tMissed ? `<span class="conn-rain-lbl ${rl.cls}">${rl.text}</span>` : ''}
  </div>
  <div class="conn-train-row${t.cancelled ? ' cancelled' : ''}">
    ${fmtTime(t.currentTime)}${dBadge} · ${t.line}
  </div>
  <div class="conn-route">${destLabel}${t.viaStops ? ' · ' + t.viaStops : ''}</div>
</div>`;
        }
        html += `</div>`;
      }
    }

    html += `<div class="footer">Aktualisiert ${fmtTime(loadedAt)} · DB IRIS · Open-Meteo</div></div>`;
    document.getElementById('root').innerHTML = html;
  }

  function renderError(msg) {
    document.getElementById('root').innerHTML = `
<div class="dashboard">
  <div class="state-box error">Fehler beim Laden.<br><small style="opacity:0.7">${msg}</small></div>
</div>`;
  }

  function updateClock() {
    const el = document.getElementById('js-clock');
    if (el) el.textContent = fmtTime(new Date()) + ' Uhr';
  }

  // ============================================================
  //  MAIN LOOP
  // ============================================================
  async function refresh() {
    try {
      appState = await loadAll();
      applyTheme();
      render(appState);
    } catch (e) {
      renderError(e.message || String(e));
    }
  }

  // Initial loading state
  applyTheme();
  document.getElementById('root').innerHTML = `
<div class="dashboard">
  <div class="state-box">Verbindungen werden geladen …</div>
</div>`;

  refresh();
  setInterval(refresh,      CFG.dataRefreshMs);
  setInterval(updateClock,  CFG.clockRefreshMs);
  </script>
</body>
</html>
