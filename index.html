<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pendler Dashboard</title>
  <style>
    /* ── Custom properties ─────────────────────────────────────── */
    :root {
      --bg-page:   #f0f0f0;
      --bg-card:   #ffffff;
      --text-main: #222222;
      --text-sub:  #444444;
      --text-muted:#777777;
      --text-dim:  #bbbbbb;
      --text-warn: #e07800;
      --border:    #ebebeb;
      --border-faint: #f5f5f5;
      --shadow:    rgba(0,0,0,0.07);
      --btn-fg:    #cccccc;
      --btn-bd:    #dddddd;
      --btn-act-fg:#333333;
      --btn-act-bg:#eeeeee;
      --btn-act-bd:#aaaaaa;
      --rb-yes-bg: #c23b00; --rb-yes-fg: #ffffff;
      --rb-no-bg:  #f0f9f4; --rb-no-fg:  #4a8a5a; --rb-no-bd:  #c8ecd8;
    }
    html[data-dark] {
      --bg-page:   #1c1c1e;
      --bg-card:   #2c2c2e;
      --text-main: #e5e5ea;
      --text-sub:  #c7c7cc;
      --text-muted:#8e8e93;
      --text-dim:  #636366;
      --text-warn: #e8a030;
      --border:    #38383a;
      --border-faint: #3a3a3c;
      --shadow:    rgba(0,0,0,0.5);
      --btn-fg:    #636366;
      --btn-bd:    #48484a;
      --btn-act-fg:#e5e5ea;
      --btn-act-bg:#3a3a3c;
      --btn-act-bd:#8e8e93;
      --rb-yes-bg: #5c1800; --rb-yes-fg: #ffc8a0;
      --rb-no-bg:  #0d2914; --rb-no-fg:  #5ab870; --rb-no-bd:  #1a4a22;
    }

    /* ── Base ──────────────────────────────────────────────────── */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg-page);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 24px;
    }

    .dashboard {
      background: var(--bg-card);
      width: 100%;
      max-width: 1100px;
      padding: 36px 40px 28px;
      border-radius: 6px;
      box-shadow: 0 1px 6px var(--shadow);
    }

    /* ── Header ────────────────────────────────────────────────── */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 36px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    .header-left {
      display: flex;
      align-items: baseline;
      gap: 16px;
    }
    .header-clock {
      font-size: 26px;
      font-weight: 300;
      color: var(--text-muted);
      letter-spacing: 0.5px;
    }
    .header-weather {
      font-size: 16px;
      color: var(--text-muted);
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-meta {
      font-size: 13px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* ── Icon buttons ──────────────────────────────────────────── */
    .icon-btn {
      background: none;
      border: 1.5px solid var(--btn-bd);
      color: var(--btn-fg);
      border-radius: 50%;
      width: 30px;
      height: 30px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      flex-shrink: 0;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .icon-btn:hover {
      border-color: var(--btn-act-bd);
      color: var(--btn-act-fg);
    }
    .icon-btn.active {
      color: var(--btn-act-fg);
      border-color: var(--btn-act-bd);
      background: var(--btn-act-bg);
    }

    /* ── Section labels ────────────────────────────────────────── */
    .section-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1.8px;
      color: var(--text-dim);
      margin-bottom: 12px;
    }

    /* ── Top grid ──────────────────────────────────────────────── */
    .top-grid {
      display: grid;
      grid-template-columns: 55% 45%;
      gap: 0;
      margin-bottom: 40px;
    }

    .badge-area {
      min-height: 30px;
      display: flex;
      align-items: center;
      margin-bottom: 6px;
    }

    .big-time {
      font-size: 52px;
      font-weight: 300;
      color: var(--text-main);
      line-height: 1;
      margin-bottom: 10px;
    }
    .big-time.dim {
      opacity: 0.32;
      text-decoration: line-through;
    }
    .delay-badge {
      font-size: 20px;
      color: var(--text-warn);
      margin-left: 10px;
      font-weight: 400;
    }

    /* ── Left column ───────────────────────────────────────────── */
    .next-line-name { font-size: 22px; color: var(--text-sub);   margin-bottom: 5px; }
    .next-route     { font-size: 15px; color: var(--text-muted); margin-bottom: 12px; }
    .next-platform  { font-size: 14px; color: var(--text-dim); }
    .info-hint      { margin-top: 12px; font-size: 14px; color: var(--text-warn); }
    .cancelled-badge {
      display: inline-flex;
      align-items: center;
      background: #cc0000;
      color: white;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.6px;
      padding: 3px 8px;
      border-radius: 3px;
      text-transform: uppercase;
    }

    /* ── Right column ──────────────────────────────────────────── */
    .top-right {
      padding-left: 40px;
      border-left: 1px solid var(--border-faint);
    }

    /* ── Rain banner ───────────────────────────────────────────── */
    .rain-banner {
      border-radius: 6px;
      padding: 13px 16px;
      margin-top: 4px;
      font-size: 15px;
      font-weight: 600;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .rain-banner .rain-detail { font-size: 12px; font-weight: 400; opacity: 0.85; }
    .rain-banner.rain-yes  { background: var(--rb-yes-bg);  color: var(--rb-yes-fg); }
    .rain-banner.rain-no   { background: var(--rb-no-bg);   color: var(--rb-no-fg);   border: 1px solid var(--rb-no-bd);  font-weight: 500; }
    .rain-banner.rain-missed {
      background: none;
      color: var(--text-warn);
      font-size: 13px;
      font-weight: 400;
      padding: 6px 0;
      margin-top: 6px;
      border: none;
    }

    /* ── Arrival line ──────────────────────────────────────────── */
    .arrival-line {
      font-size: 14px;
      color: var(--text-muted);
      margin-top: 10px;
    }

    /* ── More connections ──────────────────────────────────────── */
    .more-connections { border-top: 1px solid var(--border); padding-top: 28px; }
    .conn-item { padding: 14px 0; border-bottom: 1px solid var(--border-faint); }
    .conn-item:last-child { border-bottom: none; }

    .conn-top-row {
      display: flex;
      align-items: baseline;
      gap: 20px;
      margin-bottom: 4px;
      flex-wrap: wrap;
    }
    .conn-leg-time   { font-size: 14px; color: var(--text-dim); }
    .conn-rain-label { font-size: 14px; color: var(--text-dim); }
    .conn-rain-label.wet { color: var(--text-warn); font-weight: 600; }
    .conn-rain-label.ok  { color: var(--rb-no-fg); }
    .conn-train-row  { font-size: 17px; color: var(--text-sub); margin-bottom: 2px; }
    .conn-train-row.cancelled-text { text-decoration: line-through; opacity: 0.45; }
    .conn-delay      { font-size: 14px; color: var(--text-warn); margin-left: 6px; }
    .conn-route      { font-size: 13px; color: var(--text-dim); }
    .conn-arrival    { font-size: 13px; color: var(--text-muted); margin-top: 3px; }

    /* ── States ────────────────────────────────────────────────── */
    .state-box { padding: 60px 0; text-align: center; color: var(--text-dim); font-size: 18px; }
    .state-box.error { color: #cc4444; }
    .footer { font-size: 11px; color: var(--text-dim); text-align: right; margin-top: 24px; }

    /* ── Responsive ────────────────────────────────────────────── */
    @media (max-width: 768px) {
      body { padding: 10px; }
      .dashboard { padding: 24px 20px 18px; }
      .top-grid { grid-template-columns: 1fr; }
      .top-right {
        border-left: none;
        padding-left: 0;
        border-top: 1px solid var(--border-faint);
        padding-top: 24px;
        margin-top: 24px;
      }
      .big-time { font-size: 46px; }
    }

    @media (max-width: 430px) {
      body { padding: 6px; }
      .dashboard { padding: 16px 14px 14px; border-radius: 4px; }
      .header { margin-bottom: 24px; }
      .header-clock { font-size: 20px; }
      .header-meta { font-size: 11px; letter-spacing: 0.5px; }
      .section-label { font-size: 11px; letter-spacing: 1.2px; }
      .big-time { font-size: 38px; }
      .next-line-name { font-size: 18px; }
      .next-route { font-size: 14px; }
      .rain-banner { font-size: 14px; padding: 11px 13px; }
      .top-grid { margin-bottom: 28px; }
      .more-connections { padding-top: 20px; }
      .conn-train-row { font-size: 15px; }
    }

    @media (max-width: 390px) {
      .big-time { font-size: 34px; }
      .header-meta { display: none; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
  // ── Config ────────────────────────────────────────────────────────
  const CFG = {
    giessen:   { eva: '8000124', lat: 50.5753, lon: 8.6774 },
    frankfurt: { eva: '8000105', lat: 50.1069, lon: 8.6633 },
    bikeMin:   20,
    walkMin:   10,
    morningStart:  4,
    morningEnd:   13,
    autoDarkStart: 20,
    autoDarkEnd:    7,
    dataRefreshMs:  5 * 60 * 1000,
    clockRefreshMs: 20 * 1000,
    maxTrains: 5,
  };

  // ── State ─────────────────────────────────────────────────────────
  let directionOverride = null; // null=auto, true=morning, false=evening
  let darkOverride      = null; // null=auto, true=dark, false=light

  // ── Utilities ─────────────────────────────────────────────────────
  const p2 = n => String(n).padStart(2, '0');

  function fmtTime(d) {
    if (!d) return '--:--';
    return p2(d.getHours()) + ':' + p2(d.getMinutes());
  }

  function addMin(d, m) { return new Date(d.getTime() + m * 60_000); }

  function parseIrisTs(ts) {
    if (!ts || ts.length < 10) return null;
    return new Date(
      2000 + +ts.slice(0, 2), +ts.slice(2, 4) - 1, +ts.slice(4, 6),
      +ts.slice(6, 8), +ts.slice(8, 10),
    );
  }

  function irisDateHour(hourOffset) {
    const t = new Date(Date.now() + hourOffset * 3_600_000);
    return {
      date: String(t.getFullYear()).slice(2) + p2(t.getMonth() + 1) + p2(t.getDate()),
      hour: p2(t.getHours()),
    };
  }

  function tripHash(id) {
    if (!id) return id;
    const i = id.lastIndexOf('-');
    return i > 0 ? id.slice(0, i) : id;
  }

  // ── Direction / dark helpers ──────────────────────────────────────
  function autoMorning() {
    const h = new Date().getHours();
    return h >= CFG.morningStart && h < CFG.morningEnd;
  }
  function getMorning() {
    return directionOverride !== null ? directionOverride : autoMorning();
  }
  function autoDark() {
    const h = new Date().getHours();
    return h >= CFG.autoDarkStart || h < CFG.autoDarkEnd;
  }
  function getDark() {
    return darkOverride !== null ? darkOverride : autoDark();
  }
  function applyDark(dark) {
    if (dark) document.documentElement.setAttribute('data-dark', '');
    else       document.documentElement.removeAttribute('data-dark');
  }

  function showLoadingState() {
    applyDark(getDark());
    const morning  = getMorning();
    const modeText = morning ? 'Gießen → Frankfurt · Hinweg' : 'Frankfurt → Gießen · Rückweg';
    const dark     = getDark();
    document.getElementById('root').innerHTML = `
<div class="dashboard">
  <div class="header">
    <div class="header-left">
      <div class="header-clock" id="js-clock">${fmtTime(new Date())} Uhr</div>
    </div>
    <div class="header-right">
      <button class="icon-btn${directionOverride !== null ? ' active' : ''}" id="btn-dir"
        onclick="toggleDirection()" title="Richtung umschalten">${morning ? '→' : '←'}</button>
      <button class="icon-btn${darkOverride !== null ? ' active' : ''}" id="btn-dark"
        onclick="toggleDark()" title="Dark mode umschalten">${dark ? '☀' : '◑'}</button>
      <div class="header-meta">${modeText}</div>
    </div>
  </div>
  <div class="state-box">Verbindungen werden geladen …</div>
</div>`;
  }

  function toggleDirection() {
    directionOverride = directionOverride !== null ? null : !autoMorning();
    showLoadingState();
    refresh();
  }
  function toggleDark() {
    darkOverride = darkOverride !== null ? null : !autoDark();
    applyDark(getDark());
    updateToggles();
  }
  function updateToggles() {
    const btnDir  = document.getElementById('btn-dir');
    const btnDark = document.getElementById('btn-dark');
    if (!btnDir || !btnDark) return;
    const morning = getMorning();
    btnDir.textContent = morning ? '→' : '←';
    btnDir.title = (morning ? 'Hinweg (Giessen→Frankfurt)' : 'Rückweg (Frankfurt→Giessen)') + ' · Umschalten';
    btnDir.classList.toggle('active', directionOverride !== null);
    const dark = getDark();
    btnDark.textContent = dark ? '☀' : '◑';
    btnDark.title = (dark ? 'Hellmodus' : 'Dunkelmodus') + ' · Umschalten';
    btnDark.classList.toggle('active', darkOverride !== null);
  }

  // ── IRIS API ──────────────────────────────────────────────────────
  const IRIS_BASE = 'https://iris.noncd.db.de/iris-tts/timetable';

  async function irisPlan(eva, hourOffset) {
    const { date, hour } = irisDateHour(hourOffset);
    try {
      const r = await fetch(`${IRIS_BASE}/plan/${eva}/${date}/${hour}`, { cache: 'no-cache' });
      return r.ok ? r.text() : '<timetable/>';
    } catch { return '<timetable/>'; }
  }

  async function irisFchg(eva) {
    try {
      const r = await fetch(`${IRIS_BASE}/fchg/${eva}`, { cache: 'no-cache' });
      return r.ok ? r.text() : '<timetable/>';
    } catch { return '<timetable/>'; }
  }

  function parseFchg(xml) {
    const doc = new DOMParser().parseFromString(xml, 'text/xml');
    const map = {};
    for (const s of doc.querySelectorAll('s')) map[s.getAttribute('id')] = s;
    return map;
  }

  function parsePlan(xml, fchgMap, dirKeyword, cutoffTime) {
    const doc = new DOMParser().parseFromString(xml, 'text/xml');
    const trains = [];
    for (const s of doc.querySelectorAll('s')) {
      const dp = s.querySelector('dp');
      if (!dp) continue;
      const ppth = dp.getAttribute('ppth') || '';
      if (!ppth.includes(dirKeyword)) continue;
      const id = s.getAttribute('id');
      const tl = s.querySelector('tl');
      const plannedTime = parseIrisTs(dp.getAttribute('pt'));
      if (!plannedTime || plannedTime < cutoffTime) continue;
      let line = dp.getAttribute('l') || dp.getAttribute('fb') || '';
      if (!line && tl) {
        const c = tl.getAttribute('c') || '', n = tl.getAttribute('n') || '';
        line = (c + (n ? ' ' + n : '')).trim();
      }
      let currentTime = plannedTime, cancelled = false, hasHint = false;
      let platform = dp.getAttribute('pp') || '';
      const chg = fchgMap[id];
      if (chg) {
        const cdp = chg.querySelector('dp');
        if (cdp) {
          const ct = cdp.getAttribute('ct');
          if (ct) currentTime = parseIrisTs(ct) || plannedTime;
          if (cdp.getAttribute('cs') === 'c') cancelled = true;
          const cp = cdp.getAttribute('cp'); if (cp) platform = cp;
        }
        const hintMsg = chg.querySelector('m[t="h"]');
        if (hintMsg) hasHint = hintMsg.getAttribute('cat') || 'Information';
      }
      const stops = ppth.split('|');
      const targetIdx = stops.findIndex(s => s.includes(dirKeyword));
      const before = targetIdx > 0 ? stops.slice(0, targetIdx) : [];
      trains.push({
        id, line, plannedTime, currentTime, cancelled, hasHint, platform,
        viaStops: before.slice(-2).join(', '),
        delay: Math.max(0, Math.round((currentTime - plannedTime) / 60_000)),
      });
    }
    return trains;
  }

  function parseArrivals(xml, fchgMap) {
    const doc = new DOMParser().parseFromString(xml, 'text/xml');
    const arrivals = {};
    for (const s of doc.querySelectorAll('s')) {
      const ar = s.querySelector('ar');
      if (!ar) continue;
      const id   = s.getAttribute('id');
      const hash = tripHash(id);
      if (arrivals[hash]) continue;
      const plannedArrival = parseIrisTs(ar.getAttribute('pt'));
      if (!plannedArrival) continue;
      let currentArrival = plannedArrival;
      const chg = fchgMap[id];
      if (chg) {
        const car = chg.querySelector('ar');
        if (car) {
          const ct = car.getAttribute('ct');
          if (ct) currentArrival = parseIrisTs(ct) || plannedArrival;
        }
      }
      arrivals[hash] = { plannedArrival, currentArrival };
    }
    return arrivals;
  }

  function findArrival(dep, arrivalsByHash) {
    return arrivalsByHash[tripHash(dep.id)] || null;
  }

  function estimateTravelMin(line) {
    const u = line.toUpperCase();
    if (/^(ICE?|EC)/.test(u)) return 55;
    if (/^RB/.test(u))        return 68;
    return 60;
  }

  // ── Weather + Rain API (DWD ICON-D2 via Open-Meteo) ─────────────
  async function fetchWeather(lat, lon) {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
      `&current=temperature_2m,weather_code` +
      `&minutely_15=precipitation` +
      `&timezone=Europe%2FBerlin&forecast_days=1&models=icon_d2`;
    try {
      const r = await fetch(url);
      return r.ok ? r.json() : null;
    } catch { return null; }
  }

  function rainInWindow(rain, windowStart, windowEnd) {
    if (!rain?.minutely_15) return { wet: false, startsAt: null };
    const { time, precipitation } = rain.minutely_15;
    for (let i = 0; i < time.length; i++) {
      const slotStart = new Date(time[i]);
      const slotEnd   = new Date(+slotStart + 15 * 60_000);
      if (precipitation[i] > 0.1 && slotEnd > windowStart && slotStart < windowEnd) {
        // If the slot started before our window, rain begins at window start
        const startsAt = slotStart < windowStart ? new Date(windowStart) : slotStart;
        return { wet: true, startsAt };
      }
    }
    return { wet: false, startsAt: null };
  }

  // ── Load all data ─────────────────────────────────────────────────
  async function loadAll() {
    const morning   = getMorning();
    const from      = morning ? CFG.giessen   : CFG.frankfurt;
    const to        = morning ? CFG.frankfurt : CFG.giessen;
    const dirFilter = morning ? 'Frankfurt(Main)Hbf' : 'Gießen';
    const legBefore = morning ? CFG.bikeMin   : CFG.walkMin;
    const legAfter  = morning ? CFG.walkMin   : CFG.bikeMin;

    const [p0, p1, p2xml, fchgFromXml, a1, a2, a3, fchgToXml, weather] = await Promise.all([
      irisPlan(from.eva, 0), irisPlan(from.eva, 1), irisPlan(from.eva, 2),
      irisFchg(from.eva),
      irisPlan(to.eva, 1),   irisPlan(to.eva, 2),   irisPlan(to.eva, 3),
      irisFchg(to.eva),
      fetchWeather(from.lat, from.lon),
    ]);

    const fchgFromMap = parseFchg(fchgFromXml);
    const fchgToMap   = parseFchg(fchgToXml);
    const cutoff      = addMin(new Date(), -3);

    const seen = new Set();
    let trains = [
      ...parsePlan(p0,    fchgFromMap, dirFilter, cutoff),
      ...parsePlan(p1,    fchgFromMap, dirFilter, cutoff),
      ...parsePlan(p2xml, fchgFromMap, dirFilter, cutoff),
    ]
    .filter(t => { if (seen.has(t.id)) return false; seen.add(t.id); return true; })
    .sort((a, b) => a.currentTime - b.currentTime)
    .filter((t, _, arr) => arr.findIndex(u => u.currentTime.getTime() === t.currentTime.getTime()) === arr.indexOf(t));

    const arrivalsByHash = {
      ...parseArrivals(a1, fchgToMap),
      ...parseArrivals(a2, fchgToMap),
      ...parseArrivals(a3, fchgToMap),
    };

    const now = new Date();
    for (const t of trains) {
      t.legStart = addMin(t.currentTime, -legBefore);
      t.rain     = rainInWindow(weather, t.legStart, t.currentTime);
      const arrInfo = findArrival(t, arrivalsByHash);
      if (arrInfo) {
        t.arrivalAtStation  = arrInfo.currentArrival;
        t.arrivalIsEstimate = false;
      } else {
        t.arrivalAtStation  = addMin(t.currentTime, estimateTravelMin(t.line));
        t.arrivalIsEstimate = true;
      }
      t.arrivalAtFinal = addMin(t.arrivalAtStation, legAfter);
    }

    // Remove fully missed connections (legStart more than 2 min in the past)
    trains = trains
      .filter(t => t.legStart >= addMin(now, -2))
      .slice(0, CFG.maxTrains);

    return { morning, trains, weather, loadedAt: new Date() };
  }

  // ── Weather helpers ───────────────────────────────────────────────
  function wIcon(code) {
    if (code === 0)  return '☀';
    if (code <= 2)   return '⛅';
    if (code === 3)  return '☁';
    if (code <= 49)  return '🌫';
    if (code <= 55)  return '🌦';  // drizzle
    if (code <= 67)  return '🌧';  // rain
    if (code <= 77)  return '🌨';  // snow
    if (code <= 82)  return '🌦';  // showers
    if (code <= 86)  return '🌨';  // snow showers
    return '⛈';                    // thunderstorm
  }

  function weatherSnippet(wx) {
    if (!wx?.current) return '';
    const temp = Math.round(wx.current.temperature_2m);
    const icon = wIcon(wx.current.weather_code ?? 0);
    return `<span class="header-weather">${icon} ${temp}°</span>`;
  }

  // ── Render helpers ────────────────────────────────────────────────
  function hintLabel(cat) {
    if (cat === 'Störung')     return 'Störung gemeldet';
    if (cat === 'Bauarbeiten') return 'Bauarbeiten';
    return 'aktuelle Hinweise';
  }

  function connRainLabel(t) {
    if (t.rain.wet) {
      const at = t.rain.startsAt;
      const text = at <= t.legStart ? 'Regen ab Abfahrt' : `Regen ab ${fmtTime(at)}`;
      return { cls: 'wet', text };
    }
    return { cls: 'ok', text: 'Kein Regen' };
  }

  function rainBannerHTML(train, missed) {
    if (missed) {
      return '<div class="rain-banner rain-missed">Abfahrtszeit verpasst</div>';
    }
    if (train.rain.wet) {
      const at = train.rain.startsAt;
      const detail = at <= train.legStart
        ? 'Regen ab Abfahrt'
        : `Regen ab ${fmtTime(at)} Uhr`;
      return `<div class="rain-banner rain-yes">Regenkleidung benötigt<span class="rain-detail">${detail}</span></div>`;
    }
    return '<div class="rain-banner rain-no">Kein Regen während der Fahrt</div>';
  }

  // ── Render ────────────────────────────────────────────────────────
  function render(data) {
    const { morning, trains, weather, loadedAt } = data;

    applyDark(getDark());

    const legLabel     = morning ? 'Mit dem Fahrrad losfahren um' : 'Zu Fuß zum Bahnhof um';
    const legVerb      = morning ? 'Losfahren um' : 'Zu Fuß um';
    const destLabel    = morning ? 'Frankfurt (Main) Hbf' : 'Gießen Hbf';
    const arrivalLabel = morning ? 'Ankunft Büro' : 'Ankunft Zuhause';
    const modeText     = morning ? 'Gießen → Frankfurt · Hinweg' : 'Frankfurt → Gießen · Rückweg';

    const dark       = getDark();
    const dirActive  = directionOverride !== null;
    const darkActive = darkOverride !== null;
    const dirIcon    = morning ? '→' : '←';
    const darkIcon   = dark ? '☀' : '◑';

    let html = `
<div class="dashboard">
  <div class="header">
    <div class="header-left">
      <div class="header-clock" id="js-clock">${fmtTime(new Date())} Uhr</div>
      ${weatherSnippet(weather)}
    </div>
    <div class="header-right">
      <button class="icon-btn${dirActive ? ' active' : ''}" id="btn-dir"
        onclick="toggleDirection()"
        title="${morning ? 'Hinweg' : 'Rückweg'} · Umschalten">${dirIcon}</button>
      <button class="icon-btn${darkActive ? ' active' : ''}" id="btn-dark"
        onclick="toggleDark()"
        title="${dark ? 'Hellmodus' : 'Dunkelmodus'} · Umschalten">${darkIcon}</button>
      <div class="header-meta">${modeText}</div>
    </div>
  </div>`;

    const now = new Date();

    if (trains.length === 0) {
      html += `<div class="state-box">Keine Verbindungen in den nächsten 3 Stunden gefunden.</div>`;
    } else {
      const next = trains[0];
      const missed     = next.legStart < now;
      const delayBadge = next.delay > 0 ? `<span class="delay-badge">+${next.delay} min</span>` : '';
      const routeStr   = next.viaStops ? ` über ${next.viaStops}` : '';
      const arrStr     = next.cancelled ? '' :
        `<div class="arrival-line">${arrivalLabel}: ${next.arrivalIsEstimate ? 'ca. ' : ''}${fmtTime(next.arrivalAtFinal)} Uhr</div>`;

      html += `
  <div class="top-grid">
    <div>
      <div class="section-label">${legLabel}</div>
      <div class="badge-area"></div>
      <div class="big-time${missed ? ' dim' : ''}">${fmtTime(next.legStart)}</div>
      ${rainBannerHTML(next, missed)}
      ${arrStr}
    </div>
    <div class="top-right">
      <div class="section-label">Nächste mögliche Verbindung</div>
      <div class="badge-area">
        ${next.cancelled ? '<span class="cancelled-badge">Zug fällt aus</span>' : ''}
      </div>
      <div class="big-time${next.cancelled ? ' dim' : ''}">
        ${fmtTime(next.currentTime)}${delayBadge}
      </div>
      <div class="next-line-name">${next.line}</div>
      <div class="next-route">${destLabel}${routeStr}</div>
      ${next.platform ? `<div class="next-platform">Gleis ${next.platform}</div>` : ''}
      ${next.hasHint && !next.cancelled ? `<div class="info-hint">Achtung: ${hintLabel(next.hasHint)}</div>` : ''}
    </div>
  </div>`;

      const more = trains.slice(1);
      if (more.length > 0) {
        html += `<div class="more-connections"><div class="section-label">Weitere Verbindungen</div>`;
        for (const t of more) {
          const dBadge  = t.delay > 0 ? `<span class="conn-delay">+${t.delay} min</span>` : '';
          const rl      = connRainLabel(t);
          const arrConn = t.cancelled ? '' :
            `<div class="conn-arrival">${arrivalLabel}: ${t.arrivalIsEstimate ? 'ca. ' : ''}${fmtTime(t.arrivalAtFinal)} Uhr</div>`;
          html += `
<div class="conn-item">
  <div class="conn-top-row">
    <span class="conn-leg-time">${legVerb} ${fmtTime(t.legStart)}</span>
    <span class="conn-rain-label ${rl.cls}">${rl.text}</span>
  </div>
  <div class="conn-train-row${t.cancelled ? ' cancelled-text' : ''}">
    ${fmtTime(t.currentTime)}${dBadge}&ensp;&middot;&ensp;${t.line}
  </div>
  <div class="conn-route">${destLabel}${t.viaStops ? ' · ' + t.viaStops : ''}</div>
  ${arrConn}
</div>`;
        }
        html += `</div>`;
      }
    }

    html += `
  <div class="footer">Aktualisiert: ${fmtTime(loadedAt)} Uhr · Züge: DB IRIS · Wetter: DWD ICON-D2 via Open-Meteo</div>
</div>`;

    document.getElementById('root').innerHTML = html;
    updateToggles();
  }

  function renderError(msg) {
    const dark    = getDark();
    const dirIcon = getMorning() ? '→' : '←';
    const dkIcon  = dark ? '☀' : '◑';
    applyDark(dark);
    document.getElementById('root').innerHTML = `
<div class="dashboard">
  <div class="header">
    <div class="header-clock" id="js-clock">${fmtTime(new Date())} Uhr</div>
    <div class="header-right">
      <button class="icon-btn${directionOverride !== null ? ' active' : ''}" id="btn-dir"
        onclick="toggleDirection()" title="Richtung umschalten">${dirIcon}</button>
      <button class="icon-btn${darkOverride !== null ? ' active' : ''}" id="btn-dark"
        onclick="toggleDark()" title="Dark mode umschalten">${dkIcon}</button>
    </div>
  </div>
  <div class="state-box error">
    Fehler beim Laden der Daten.<br>
    <small style="font-size:14px;opacity:0.7">${msg}</small>
  </div>
</div>`;
  }

  function updateClock() {
    const el = document.getElementById('js-clock');
    if (el) el.textContent = fmtTime(new Date()) + ' Uhr';
  }

  // ── Main loop ─────────────────────────────────────────────────────
  let refreshGen = 0;

  async function refresh() {
    const myGen = ++refreshGen;
    try {
      const data = await loadAll();
      if (myGen !== refreshGen) return; // a newer refresh started; discard
      render(data);
    } catch (e) {
      if (myGen !== refreshGen) return;
      renderError(e.message || String(e));
    }
  }

  applyDark(getDark());
  document.getElementById('root').innerHTML = `
<div class="dashboard">
  <div class="state-box">Verbindungen werden geladen …</div>
</div>`;

  refresh();
  setInterval(refresh, CFG.dataRefreshMs);
  setInterval(updateClock, CFG.clockRefreshMs);
  </script>
</body>
</html>
